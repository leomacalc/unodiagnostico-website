<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003f6b;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#005a87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007ab5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#abce5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e47a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="700" cy="60" r="120" fill="#007ab5" opacity="0.25"/>
  <circle cx="740" cy="320" r="80" fill="#abce5f" opacity="0.12"/>
  <circle cx="80" cy="350" r="100" fill="#005a87" opacity="0.3"/>
  <circle cx="50" cy="80" r="60" fill="#abce5f" opacity="0.1"/>

  <!-- Decorative dots pattern -->
  <circle cx="600" cy="40" r="4" fill="#abce5f" opacity="0.5"/>
  <circle cx="625" cy="55" r="3" fill="#abce5f" opacity="0.4"/>
  <circle cx="615" cy="75" r="5" fill="#abce5f" opacity="0.3"/>
  <circle cx="650" cy="35" r="3" fill="#abce5f" opacity="0.5"/>

  <!-- Three modality cards -->

  <!-- Card 1: Raio-X -->
  <g transform="translate(80 110)">
    <rect x="0" y="0" width="170" height="160" rx="14" fill="url(#card)" stroke="#abce5f" stroke-width="2" opacity="0.95"/>
    <!-- X-ray icon: ribcage simplified -->
    <g transform="translate(85 70)">
      <!-- Spine -->
      <rect x="-3" y="-40" width="6" height="80" rx="2" fill="#ffffff" opacity="0.95"/>
      <!-- Ribs -->
      <path d="M 0 -30 Q -35 -20 -38 0" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.9"/>
      <path d="M 0 -30 Q 35 -20 38 0" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.9"/>
      <path d="M 0 -15 Q -38 -5 -40 15" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.9"/>
      <path d="M 0 -15 Q 38 -5 40 15" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.9"/>
      <path d="M 0 0 Q -38 10 -38 28" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.85"/>
      <path d="M 0 0 Q 38 10 38 28" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.85"/>
    </g>
    <!-- Label -->
    <text x="85" y="135" font-family="Montserrat, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">RAIO-X</text>
    <text x="85" y="150" font-family="Open Sans, Arial, sans-serif" font-size="10" fill="#c8e47a" text-anchor="middle">Rápido • Ossos</text>
  </g>

  <!-- Card 2: Tomografia -->
  <g transform="translate(315 110)">
    <rect x="0" y="0" width="170" height="160" rx="14" fill="url(#card)" stroke="#abce5f" stroke-width="2" opacity="0.95"/>
    <!-- CT scan icon: gantry with patient -->
    <g transform="translate(85 70)">
      <!-- Gantry outer ring -->
      <circle cx="0" cy="0" r="42" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.95"/>
      <circle cx="0" cy="0" r="34" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
      <!-- Inner detail -->
      <circle cx="0" cy="0" r="20" fill="#abce5f" opacity="0.35"/>
      <!-- Patient table -->
      <rect x="-50" y="32" width="100" height="6" rx="2" fill="#ffffff" opacity="0.9"/>
      <!-- Slice lines -->
      <line x1="-30" y1="-15" x2="30" y2="-15" stroke="#abce5f" stroke-width="1.5" opacity="0.7"/>
      <line x1="-30" y1="0" x2="30" y2="0" stroke="#abce5f" stroke-width="1.5" opacity="0.7"/>
      <line x1="-30" y1="15" x2="30" y2="15" stroke="#abce5f" stroke-width="1.5" opacity="0.7"/>
    </g>
    <!-- Label -->
    <text x="85" y="135" font-family="Montserrat, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">TOMOGRAFIA</text>
    <text x="85" y="150" font-family="Open Sans, Arial, sans-serif" font-size="10" fill="#c8e47a" text-anchor="middle">Cortes • Detalhes</text>
  </g>

  <!-- Card 3: Ressonância -->
  <g transform="translate(550 110)">
    <rect x="0" y="0" width="170" height="160" rx="14" fill="url(#card)" stroke="#abce5f" stroke-width="2" opacity="0.95"/>
    <!-- MRI icon: tunnel + magnetic field -->
    <g transform="translate(85 70)">
      <!-- Tunnel -->
      <rect x="-50" y="-30" width="100" height="60" rx="14" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.95"/>
      <ellipse cx="-50" cy="0" rx="6" ry="30" fill="#003f6b" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
      <ellipse cx="50" cy="0" rx="6" ry="30" fill="#003f6b" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
      <!-- Patient table -->
      <rect x="-55" y="32" width="110" height="6" rx="2" fill="#ffffff" opacity="0.9"/>
      <!-- Magnetic field waves -->
      <path d="M -30 -5 Q -15 -15 0 -5 Q 15 5 30 -5" fill="none" stroke="#abce5f" stroke-width="2" opacity="0.85"/>
      <path d="M -30 10 Q -15 0 0 10 Q 15 20 30 10" fill="none" stroke="#abce5f" stroke-width="2" opacity="0.7"/>
    </g>
    <!-- Label -->
    <text x="85" y="135" font-family="Montserrat, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">RESSONÂNCIA</text>
    <text x="85" y="150" font-family="Open Sans, Arial, sans-serif" font-size="10" fill="#c8e47a" text-anchor="middle">Sem radiação • Tecidos</text>
  </g>

  <!-- Connector dots between cards -->
  <circle cx="265" cy="190" r="4" fill="#abce5f" opacity="0.85"/>
  <circle cx="280" cy="190" r="3" fill="#abce5f" opacity="0.6"/>
  <circle cx="295" cy="190" r="4" fill="#abce5f" opacity="0.85"/>

  <circle cx="500" cy="190" r="4" fill="#abce5f" opacity="0.85"/>
  <circle cx="515" cy="190" r="3" fill="#abce5f" opacity="0.6"/>
  <circle cx="530" cy="190" r="4" fill="#abce5f" opacity="0.85"/>

  <!-- Green accent bar at bottom -->
  <rect x="0" y="350" width="800" height="6" fill="url(#accent)" opacity="0.8"/>

  <!-- Text block -->
  <text x="400" y="310" font-family="Montserrat, Arial, sans-serif" font-size="26" font-weight="700"
        fill="#ffffff" text-anchor="middle" letter-spacing="0.5">
    Raio-X, Tomografia ou Ressonância?
  </text>
  <text x="400" y="338" font-family="Open Sans, Arial, sans-serif" font-size="14" font-weight="400"
        fill="#c8e47a" text-anchor="middle" letter-spacing="0.3">
    Entenda qual exame é mais indicado para cada situação
  </text>

  <!-- Logo / brand mark -->
  <text x="40" y="30" font-family="Montserrat, Arial, sans-serif" font-size="13" font-weight="700"
        fill="#abce5f" opacity="0.9">UNO DIAGNÓSTICO</text>
  <rect x="40" y="34" width="150" height="2" fill="#abce5f" opacity="0.5" rx="1"/>
</svg>
