<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)" rx="0"/>
  <!-- Decorative -->
  <circle cx="680" cy="100" r="100" fill="#005a87" opacity="0.06"/>
  <circle cx="120" cy="320" r="60" fill="#abce5f" opacity="0.1"/>
  <!-- Radiation symbol -->
  <g transform="translate(400, 160)">
    <circle cx="0" cy="0" r="14" fill="#005a87"/>
    <path d="M0,-14 A60,60 0 0,1 12.1,6.5 L0,0 Z" fill="#005a87" opacity="0.85"/>
    <path d="M12.1,6.5 A60,60 0 0,1 -12.1,6.5 L0,0 Z" fill="#005a87" opacity="0.85"/>
    <path d="M-12.1,6.5 A60,60 0 0,1 0,-14 L0,0 Z" fill="#005a87" opacity="0.85"/>
    <!-- Outer petals -->
    <path d="M0,-70 A70,70 0 0,1 60.6,-35 L12.1,-7 A14,14 0 0,0 0,-14 Z" fill="#abce5f" opacity="0.6"/>
    <path d="M60.6,-35 A70,70 0 0,1 60.6,35 L12.1,7 A14,14 0 0,0 12.1,-7 Z" fill="#abce5f" opacity="0.6"/>
    <path d="M60.6,35 A70,70 0 0,1 0,70 L0,14 A14,14 0 0,0 12.1,7 Z" fill="#abce5f" opacity="0.6"/>
    <path d="M0,70 A70,70 0 0,1 -60.6,35 L-12.1,7 A14,14 0 0,0 0,14 Z" fill="#005a87" opacity="0.3"/>
    <path d="M-60.6,35 A70,70 0 0,1 -60.6,-35 L-12.1,-7 A14,14 0 0,0 -12.1,7 Z" fill="#005a87" opacity="0.3"/>
    <path d="M-60.6,-35 A70,70 0 0,1 0,-70 L0,-14 A14,14 0 0,0 -12.1,-7 Z" fill="#005a87" opacity="0.3"/>
    <!-- Checkmark overlay -->
    <g transform="translate(50, -50)">
      <circle cx="0" cy="0" r="24" fill="#abce5f"/>
      <path d="M-10,0 L-3,8 L12,-8" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  <!-- Text -->
  <text x="400" y="310" font-family="Montserrat, Arial, sans-serif" font-size="22" font-weight="700" fill="#005a87" text-anchor="middle">MITOS E VERDADES</text>
  <text x="400" y="340" font-family="Open Sans, Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle">Radiação em exames de imagem</text>
</svg>
