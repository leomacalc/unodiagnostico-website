<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003f6b;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#005a87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007ab5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#abce5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e47a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vessel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.95" />
      <stop offset="50%" style="stop-color:#ffd166;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#abce5f;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="probePanel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="700" cy="60" r="120" fill="#007ab5" opacity="0.25"/>
  <circle cx="740" cy="320" r="80" fill="#abce5f" opacity="0.12"/>
  <circle cx="80" cy="350" r="100" fill="#005a87" opacity="0.3"/>
  <circle cx="50" cy="80" r="60" fill="#abce5f" opacity="0.1"/>

  <!-- Decorative dots -->
  <circle cx="600" cy="40" r="4" fill="#abce5f" opacity="0.5"/>
  <circle cx="625" cy="55" r="3" fill="#abce5f" opacity="0.4"/>
  <circle cx="615" cy="75" r="5" fill="#abce5f" opacity="0.3"/>
  <circle cx="650" cy="35" r="3" fill="#abce5f" opacity="0.5"/>

  <!-- Sound waves emitting from probe -->
  <g opacity="0.55">
    <path d="M 220 175 Q 260 165 300 175" fill="none" stroke="#abce5f" stroke-width="2"/>
    <path d="M 215 185 Q 260 173 305 185" fill="none" stroke="#abce5f" stroke-width="2"/>
    <path d="M 210 195 Q 260 181 310 195" fill="none" stroke="#abce5f" stroke-width="2"/>
  </g>

  <!-- Ultrasound probe (transducer) -->
  <g transform="translate(170 110)">
    <!-- Probe body -->
    <rect x="0" y="0" width="50" height="80" rx="10" fill="#ffffff" opacity="0.95"/>
    <rect x="6" y="6" width="38" height="50" rx="6" fill="#005a87" opacity="0.85"/>
    <!-- Probe head -->
    <rect x="2" y="60" width="46" height="14" rx="4" fill="#abce5f" opacity="0.95"/>
    <!-- Cable -->
    <path d="M 25 0 Q 60 -30 110 -10" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.85"/>
    <!-- Buttons on probe -->
    <circle cx="15" cy="35" r="3" fill="#ffffff" opacity="0.7"/>
    <circle cx="35" cy="35" r="3" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- Blood vessel cross-section with Doppler color flow -->
  <g transform="translate(310 130)">
    <!-- Vessel wall (artery) -->
    <path d="M 0 60 Q 80 20 200 50 Q 290 70 380 40"
          fill="none" stroke="#ffffff" stroke-width="34" opacity="0.18"
          stroke-linecap="round"/>
    <!-- Inner flow (Doppler colors: red->yellow->green) -->
    <path d="M 0 60 Q 80 20 200 50 Q 290 70 380 40"
          fill="none" stroke="url(#vessel)" stroke-width="22" opacity="0.95"
          stroke-linecap="round"/>
    <!-- Highlight stripe -->
    <path d="M 0 60 Q 80 20 200 50 Q 290 70 380 40"
          fill="none" stroke="#ffffff" stroke-width="3" opacity="0.45"
          stroke-linecap="round"/>

    <!-- Flow direction arrows on vessel -->
    <g fill="#ffffff" opacity="0.85">
      <polygon points="60,46 75,42 60,38"/>
      <polygon points="180,42 195,46 180,50"/>
      <polygon points="320,52 335,48 320,44"/>
    </g>

    <!-- Pulsing flow particles -->
    <circle cx="40" cy="50" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="130" cy="36" r="3" fill="#ffffff" opacity="0.7"/>
    <circle cx="240" cy="58" r="3" fill="#ffffff" opacity="0.75"/>
    <circle cx="340" cy="48" r="3" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- Doppler waveform (spectral display) at right -->
  <g transform="translate(550 100)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="url(#probePanel)" stroke="#abce5f" stroke-width="2" opacity="0.95"/>
    <!-- Baseline -->
    <line x1="10" y1="80" x2="190" y2="80" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
    <!-- Waveform peaks (cardiac cycles) -->
    <path d="M 10 80
             L 25 80 Q 35 25 45 80
             L 60 80 Q 70 25 80 80
             L 95 80 Q 105 25 115 80
             L 130 80 Q 140 25 150 80
             L 165 80 Q 175 35 185 80
             L 190 80"
          fill="none" stroke="#abce5f" stroke-width="2.5" opacity="0.95"/>
    <!-- Filled waveform area -->
    <path d="M 10 80
             L 25 80 Q 35 25 45 80
             L 60 80 Q 70 25 80 80
             L 95 80 Q 105 25 115 80
             L 130 80 Q 140 25 150 80
             L 165 80 Q 175 35 185 80
             L 190 80 Z"
          fill="#abce5f" opacity="0.25"/>
    <!-- Time markers -->
    <line x1="10" y1="105" x2="190" y2="105" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    <text x="100" y="20" font-family="Montserrat, Arial, sans-serif" font-size="11" font-weight="700"
          fill="#ffffff" text-anchor="middle" opacity="0.9">DOPPLER ESPECTRAL</text>
  </g>

  <!-- Title -->
  <text x="400" y="320" font-family="Montserrat, Arial, sans-serif" font-size="26" font-weight="800"
        fill="#ffffff" text-anchor="middle">Ultrassom Doppler vascular</text>

  <!-- Subtitle -->
  <text x="400" y="355" font-family="Open Sans, Arial, sans-serif" font-size="15" font-weight="400"
        fill="#c8e47a" text-anchor="middle">Avaliação do fluxo sanguíneo • Trombose • Varizes</text>

  <!-- Bottom accent line -->
  <rect x="280" y="370" width="240" height="3" rx="1.5" fill="url(#accent)" opacity="0.85"/>
</svg>
