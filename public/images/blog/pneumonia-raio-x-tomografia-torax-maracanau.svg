<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgPN" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003f6b;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#005a87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007ab5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentPN" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#abce5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e47a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="screenPN" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a2540;stop-opacity:0.95" />
      <stop offset="60%" style="stop-color:#031426;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#000814;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="lungPN" cx="50%" cy="45%" r="65%">
      <stop offset="0%" style="stop-color:#1b3a5c;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#06182c;stop-opacity:0.9" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgPN)" />

  <!-- Decorative circles -->
  <circle cx="700" cy="60" r="120" fill="#007ab5" opacity="0.25"/>
  <circle cx="740" cy="320" r="80" fill="#abce5f" opacity="0.12"/>
  <circle cx="80" cy="350" r="100" fill="#005a87" opacity="0.3"/>
  <circle cx="50" cy="80" r="60" fill="#abce5f" opacity="0.1"/>

  <!-- Decorative dots -->
  <circle cx="600" cy="40" r="4" fill="#abce5f" opacity="0.5"/>
  <circle cx="625" cy="55" r="3" fill="#abce5f" opacity="0.4"/>
  <circle cx="615" cy="75" r="5" fill="#abce5f" opacity="0.3"/>
  <circle cx="650" cy="35" r="3" fill="#abce5f" opacity="0.5"/>

  <!-- Chest X-ray viewer (left) -->
  <g transform="translate(60 50)">
    <rect x="0" y="0" width="280" height="240" rx="10" fill="url(#screenPN)" stroke="#abce5f" stroke-width="2.5" opacity="0.95"/>

    <!-- Top clips -->
    <rect x="50" y="-6" width="22" height="12" rx="2" fill="#ffffff" opacity="0.7"/>
    <rect x="208" y="-6" width="22" height="12" rx="2" fill="#ffffff" opacity="0.7"/>

    <!-- Rib cage outline -->
    <path d="M 140 30 L 140 200" stroke="#cfe7ff" stroke-width="2" opacity="0.6"/>
    <g stroke="#9ec6ec" stroke-width="1.4" fill="none" opacity="0.5">
      <path d="M 60 70 Q 100 60 138 72"/>
      <path d="M 56 92 Q 100 82 138 94"/>
      <path d="M 54 114 Q 100 104 138 116"/>
      <path d="M 56 136 Q 100 128 138 138"/>
      <path d="M 60 158 Q 100 150 138 160"/>
      <path d="M 142 72 Q 180 60 220 70"/>
      <path d="M 142 94 Q 182 82 224 92"/>
      <path d="M 142 116 Q 184 104 226 114"/>
      <path d="M 142 138 Q 182 128 224 136"/>
      <path d="M 142 160 Q 180 150 220 158"/>
    </g>

    <!-- Left lung (healthy = dark/clear) -->
    <path d="M 130 50 Q 78 56 66 110 Q 60 160 86 196 Q 110 206 128 190 L 130 50 Z"
          fill="url(#lungPN)" stroke="#cfe7ff" stroke-width="1.8" opacity="0.85"/>

    <!-- Right lung (with consolidation = highlighted patch) -->
    <path d="M 150 50 Q 202 56 214 110 Q 220 160 194 196 Q 170 206 152 190 L 150 50 Z"
          fill="url(#lungPN)" stroke="#cfe7ff" stroke-width="1.8" opacity="0.85"/>

    <!-- Pneumonia consolidation (opacity in right lower lung) -->
    <path d="M 168 130 Q 200 132 200 165 Q 188 192 162 186 Q 154 158 168 130 Z"
          fill="#ff8a65" stroke="#ffb59b" stroke-width="1.6" opacity="0.5"/>
    <path d="M 174 145 Q 194 150 192 168 Q 182 184 164 178 Q 162 160 174 145 Z"
          fill="#ff8a65" opacity="0.7"/>

    <!-- Heart silhouette -->
    <path d="M 120 150 Q 100 150 102 172 Q 106 192 134 200 Q 140 178 138 158 Q 130 150 120 150 Z"
          fill="#1b3a5c" stroke="#cfe7ff" stroke-width="1.2" opacity="0.6"/>

    <!-- Label arrow pointing to consolidation -->
    <g>
      <path d="M 244 150 L 204 162" fill="none" stroke="#ff8a65" stroke-width="2" stroke-linecap="round"/>
      <path d="M 208 158 L 203 163 L 208 167" fill="none" stroke="#ff8a65" stroke-width="2" stroke-linecap="round"/>
      <text x="246" y="146" font-family="Montserrat, Arial, sans-serif" font-size="9" font-weight="700" fill="#ff8a65">PNEUMONIA</text>
    </g>

    <!-- Labels -->
    <text x="14" y="20" font-family="Montserrat, Arial, sans-serif" font-size="10" font-weight="700"
          fill="#abce5f" opacity="0.95">RX</text>
    <text x="266" y="20" font-family="Montserrat, Arial, sans-serif" font-size="10" font-weight="700"
          fill="#abce5f" opacity="0.95" text-anchor="end">PA</text>
    <text x="140" y="232" font-family="Montserrat, Arial, sans-serif" font-size="9" font-weight="700"
          fill="#abce5f" text-anchor="middle" opacity="0.95">TÓRAX • UNO DIAGNÓSTICO</text>
  </g>

  <!-- Lungs icon (right side) -->
  <g transform="translate(545 105)">
    <ellipse cx="60" cy="55" rx="78" ry="60" fill="#abce5f" opacity="0.16" stroke="#abce5f" stroke-width="2.5"/>
    <!-- trachea -->
    <rect x="56" y="6" width="8" height="34" rx="4" fill="#ffffff" opacity="0.9"/>
    <path d="M 60 40 Q 44 48 38 64" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <path d="M 60 40 Q 76 48 82 64" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <!-- left lung lobe -->
    <path d="M 38 60 Q 18 70 20 96 Q 24 116 46 110 Q 56 90 52 66 Q 46 58 38 60 Z"
          fill="#ffffff" opacity="0.92"/>
    <!-- right lung lobe -->
    <path d="M 82 60 Q 102 70 100 96 Q 96 116 74 110 Q 64 90 68 66 Q 74 58 82 60 Z"
          fill="#ffffff" opacity="0.92"/>
    <!-- inflamed patch -->
    <circle cx="84" cy="92" r="12" fill="#ff8a65" opacity="0.6"/>

    <!-- Sparkles -->
    <circle cx="8" cy="12" r="2.5" fill="#abce5f" opacity="0.75"/>
    <circle cx="112" cy="16" r="2" fill="#c8e47a" opacity="0.65"/>
    <circle cx="14" cy="108" r="2" fill="#abce5f" opacity="0.55"/>
    <circle cx="112" cy="106" r="2.5" fill="#c8e47a" opacity="0.7"/>
  </g>

  <!-- Decorative wave -->
  <g opacity="0.4" fill="none" stroke="#abce5f" stroke-width="2.5" stroke-linecap="round">
    <path d="M 480 225 Q 540 245 590 262 Q 640 277 700 248"/>
    <circle cx="700" cy="248" r="6" fill="#abce5f" stroke="none" opacity="0.85"/>
  </g>

  <!-- Title -->
  <text x="400" y="325" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="800"
        fill="#ffffff" text-anchor="middle">Pneumonia no inverno</text>

  <!-- Subtitle -->
  <text x="400" y="358" font-family="Open Sans, Arial, sans-serif" font-size="14" font-weight="400"
        fill="#c8e47a" text-anchor="middle">Como o raio-X e a tomografia confirmam o diagnóstico</text>

  <!-- Accent line -->
  <rect x="280" y="372" width="240" height="3" rx="1.5" fill="url(#accentPN)" opacity="0.85"/>
</svg>
