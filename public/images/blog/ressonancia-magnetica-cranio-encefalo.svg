<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgCR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003f6b;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#005a87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007ab5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentCR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#abce5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e47a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="screenCR" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a2540;stop-opacity:0.95" />
      <stop offset="60%" style="stop-color:#031426;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#000814;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="brainGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" style="stop-color:#eaf3ff;stop-opacity:0.95" />
      <stop offset="70%" style="stop-color:#bcd9f5;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8fb8e0;stop-opacity:0.6" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgCR)" />

  <!-- Decorative circles -->
  <circle cx="700" cy="60" r="120" fill="#007ab5" opacity="0.25"/>
  <circle cx="740" cy="320" r="80" fill="#abce5f" opacity="0.12"/>
  <circle cx="80" cy="350" r="100" fill="#005a87" opacity="0.3"/>
  <circle cx="50" cy="80" r="60" fill="#abce5f" opacity="0.1"/>

  <!-- Decorative dots -->
  <circle cx="600" cy="40" r="4" fill="#abce5f" opacity="0.5"/>
  <circle cx="625" cy="55" r="3" fill="#abce5f" opacity="0.4"/>
  <circle cx="615" cy="75" r="5" fill="#abce5f" opacity="0.3"/>
  <circle cx="650" cy="35" r="3" fill="#abce5f" opacity="0.5"/>

  <!-- MRI viewer screen (left side) showing axial brain -->
  <g transform="translate(60 50)">
    <rect x="0" y="0" width="280" height="240" rx="10" fill="url(#screenCR)" stroke="#abce5f" stroke-width="2.5" opacity="0.95"/>

    <!-- Top clips -->
    <rect x="50" y="-6" width="22" height="12" rx="2" fill="#ffffff" opacity="0.7"/>
    <rect x="208" y="-6" width="22" height="12" rx="2" fill="#ffffff" opacity="0.7"/>

    <!-- Skull outline -->
    <ellipse cx="140" cy="120" rx="92" ry="80" fill="none" stroke="#cfe7ff" stroke-width="3" opacity="0.55"/>

    <!-- Brain (axial slice) -->
    <ellipse cx="140" cy="120" rx="80" ry="68" fill="url(#brainGrad)" opacity="0.92"/>

    <!-- Central fissure -->
    <path d="M 140 54 L 140 188" stroke="#5e8bc0" stroke-width="2.5" opacity="0.6"/>

    <!-- Gyri / sulci (brain folds) left hemisphere -->
    <g stroke="#5e8bc0" stroke-width="2" fill="none" opacity="0.55">
      <path d="M 75 95 Q 95 85 110 100 Q 95 115 80 110"/>
      <path d="M 72 130 Q 95 122 112 138 Q 92 152 76 146"/>
      <path d="M 82 165 Q 100 160 118 172"/>
      <path d="M 95 75 Q 112 70 122 84"/>
    </g>
    <!-- Gyri / sulci right hemisphere -->
    <g stroke="#5e8bc0" stroke-width="2" fill="none" opacity="0.55">
      <path d="M 205 95 Q 185 85 170 100 Q 185 115 200 110"/>
      <path d="M 208 130 Q 185 122 168 138 Q 188 152 204 146"/>
      <path d="M 198 165 Q 180 160 162 172"/>
      <path d="M 185 75 Q 168 70 158 84"/>
    </g>

    <!-- Ventricles (green) -->
    <path d="M 130 105 Q 122 120 130 138 L 138 138 L 138 105 Z" fill="#abce5f" opacity="0.7"/>
    <path d="M 150 105 Q 158 120 150 138 L 142 138 L 142 105 Z" fill="#abce5f" opacity="0.7"/>

    <!-- Finding highlight -->
    <circle cx="178" cy="112" r="11" fill="#ff8a65" opacity="0.45"/>
    <circle cx="178" cy="112" r="5" fill="#ff8a65" opacity="0.9"/>

    <!-- Label arrow pointing to finding -->
    <g>
      <path d="M 222 88 L 188 108" fill="none" stroke="#ff8a65" stroke-width="2" stroke-linecap="round"/>
      <path d="M 192 104 L 187 109 L 192 113" fill="none" stroke="#ff8a65" stroke-width="2" stroke-linecap="round"/>
      <text x="224" y="84" font-family="Montserrat, Arial, sans-serif" font-size="9" font-weight="700" fill="#ff8a65">ACHADO</text>
    </g>

    <!-- Labels -->
    <text x="14" y="20" font-family="Montserrat, Arial, sans-serif" font-size="10" font-weight="700"
          fill="#abce5f" opacity="0.95">RM T2</text>
    <text x="266" y="20" font-family="Montserrat, Arial, sans-serif" font-size="10" font-weight="700"
          fill="#abce5f" opacity="0.95" text-anchor="end">AX</text>
    <text x="140" y="232" font-family="Montserrat, Arial, sans-serif" font-size="9" font-weight="700"
          fill="#abce5f" text-anchor="middle" opacity="0.95">CRÂNIO • UNO DIAGNÓSTICO</text>
  </g>

  <!-- MRI machine icon (right side) -->
  <g transform="translate(530 110)">
    <ellipse cx="60" cy="60" rx="80" ry="60" fill="#abce5f" opacity="0.18" stroke="#abce5f" stroke-width="2.5"/>
    <ellipse cx="60" cy="60" rx="55" ry="40" fill="#ffffff" opacity="0.95"/>
    <ellipse cx="60" cy="60" rx="38" ry="26" fill="url(#screenCR)" stroke="#005a87" stroke-width="1.5" opacity="0.9"/>
    <ellipse cx="60" cy="60" rx="22" ry="14" fill="#abce5f" opacity="0.35"/>

    <!-- Magnetic field arcs -->
    <g stroke="#abce5f" stroke-width="2" fill="none" opacity="0.55">
      <path d="M -10 30 Q -25 60 -10 90"/>
      <path d="M -20 20 Q -40 60 -20 100"/>
      <path d="M 130 30 Q 145 60 130 90"/>
      <path d="M 140 20 Q 160 60 140 100"/>
    </g>

    <!-- Sparkles -->
    <circle cx="10" cy="10" r="2.5" fill="#abce5f" opacity="0.75"/>
    <circle cx="115" cy="15" r="2" fill="#c8e47a" opacity="0.65"/>
    <circle cx="20" cy="115" r="2" fill="#abce5f" opacity="0.55"/>
    <circle cx="115" cy="118" r="2.5" fill="#c8e47a" opacity="0.7"/>
  </g>

  <!-- Decorative wave -->
  <g opacity="0.4" fill="none" stroke="#abce5f" stroke-width="2.5" stroke-linecap="round">
    <path d="M 480 220 Q 540 240 590 260 Q 640 275 700 245"/>
    <circle cx="700" cy="245" r="6" fill="#abce5f" stroke="none" opacity="0.85"/>
  </g>

  <!-- Title -->
  <text x="400" y="325" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="800"
        fill="#ffffff" text-anchor="middle">Ressonância magnética do crânio</text>

  <!-- Subtitle -->
  <text x="400" y="358" font-family="Open Sans, Arial, sans-serif" font-size="14" font-weight="400"
        fill="#c8e47a" text-anchor="middle">Dores de cabeça, tonturas e a saúde do cérebro</text>

  <!-- Accent line -->
  <rect x="280" y="372" width="240" height="3" rx="1.5" fill="url(#accentCR)" opacity="0.85"/>
</svg>
