<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003f6b;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#005a87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007ab5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#abce5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e47a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="wombGrad" cx="42%" cy="38%" r="68%">
      <stop offset="0%" style="stop-color:#ffe9d4;stop-opacity:0.98" />
      <stop offset="55%" style="stop-color:#f0b489;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#c9835a;stop-opacity:0.9" />
    </radialGradient>
    <linearGradient id="screenPanel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="700" cy="60" r="120" fill="#007ab5" opacity="0.25"/>
  <circle cx="740" cy="320" r="80" fill="#abce5f" opacity="0.12"/>
  <circle cx="80" cy="350" r="100" fill="#005a87" opacity="0.3"/>
  <circle cx="50" cy="80" r="60" fill="#abce5f" opacity="0.1"/>

  <!-- Decorative dots -->
  <circle cx="600" cy="40" r="4" fill="#abce5f" opacity="0.5"/>
  <circle cx="625" cy="55" r="3" fill="#abce5f" opacity="0.4"/>
  <circle cx="615" cy="75" r="5" fill="#abce5f" opacity="0.3"/>
  <circle cx="650" cy="35" r="3" fill="#abce5f" opacity="0.5"/>

  <!-- Womb with curled fetus (center-left) -->
  <g transform="translate(225 175)">
    <circle cx="0" cy="0" r="92" fill="url(#wombGrad)" stroke="#ffffff" stroke-width="2" opacity="0.95"/>
    <circle cx="-14" cy="-16" r="54" fill="#ffffff" opacity="0.1" filter="url(#glow)"/>
    <!-- Fetus body -->
    <path d="M 4 -6 Q 40 -6 46 30 Q 48 56 16 60 Q -14 62 -24 38 Q -30 20 -20 2 Q -14 -8 4 -6 Z"
          fill="#fff6ec" stroke="#b9764a" stroke-width="1.5" opacity="0.96"/>
    <!-- Fetus head -->
    <circle cx="-26" cy="-28" r="25" fill="#fff6ec" stroke="#b9764a" stroke-width="1.5" opacity="0.96"/>
    <!-- Arm + leg hints -->
    <path d="M 2 14 Q 16 22 12 40" fill="none" stroke="#b9764a" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
    <path d="M 28 46 Q 10 56 -8 48" fill="none" stroke="#b9764a" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
    <!-- Face hint -->
    <circle cx="-34" cy="-24" r="3.2" fill="#b9764a" opacity="0.7"/>
    <!-- Heartbeat spark -->
    <circle cx="8" cy="16" r="9" fill="#ff9bb0" opacity="0.55"/>
    <circle cx="8" cy="16" r="4.5" fill="#ff7a96" opacity="0.85"/>
  </g>

  <!-- Sound waves emitting toward womb -->
  <g opacity="0.55">
    <path d="M 165 110 Q 200 100 235 112" fill="none" stroke="#abce5f" stroke-width="2"/>
    <path d="M 160 122 Q 200 110 240 125" fill="none" stroke="#abce5f" stroke-width="2"/>
    <path d="M 155 135 Q 200 120 245 138" fill="none" stroke="#abce5f" stroke-width="2"/>
  </g>

  <!-- Ultrasound probe (transducer) -->
  <g transform="translate(178 55)">
    <rect x="0" y="0" width="44" height="58" rx="9" fill="#ffffff" opacity="0.95"/>
    <rect x="5" y="5" width="34" height="38" rx="5" fill="#005a87" opacity="0.85"/>
    <rect x="2" y="46" width="40" height="10" rx="3" fill="#abce5f" opacity="0.95"/>
    <path d="M 22 0 Q 50 -22 95 -8" fill="none" stroke="#ffffff" stroke-width="3.5" opacity="0.85"/>
    <circle cx="13" cy="26" r="2.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="31" cy="26" r="2.5" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- Ultrasound monitor at right -->
  <g transform="translate(450 70)">
    <rect x="0" y="0" width="280" height="190" rx="12" fill="url(#screenPanel)" stroke="#abce5f" stroke-width="2" opacity="0.95"/>
    <!-- US cone -->
    <path d="M 140 15 L 30 170 L 250 170 Z" fill="#0a1d2e" opacity="0.6"/>
    <!-- Fetus profile silhouette -->
    <circle cx="138" cy="92" r="38" fill="#dfe9c8" opacity="0.8"/>
    <path d="M 148 118 Q 202 128 200 165 L 104 165 Q 96 134 148 118 Z" fill="#dfe9c8" opacity="0.8"/>
    <!-- Profile face notch -->
    <path d="M 104 86 Q 96 93 101 101 Q 107 109 101 117" fill="none" stroke="#0a1d2e" stroke-width="3" opacity="0.55"/>
    <!-- Speckle -->
    <g fill="#abce5f" opacity="0.5">
      <circle cx="172" cy="58" r="1.5"/>
      <circle cx="202" cy="98" r="1.4"/>
      <circle cx="92" cy="122" r="1.5"/>
      <circle cx="186" cy="142" r="1.4"/>
      <circle cx="120" cy="52" r="1.3"/>
      <circle cx="150" cy="150" r="1.4"/>
    </g>
    <!-- Info bar -->
    <text x="14" y="28" font-family="Montserrat, Arial, sans-serif" font-size="9" font-weight="600"
          fill="#ffffff" opacity="0.7">OB • 22 sem</text>
    <!-- Screen label -->
    <text x="140" y="184" font-family="Montserrat, Arial, sans-serif" font-size="10" font-weight="700"
          fill="#abce5f" text-anchor="middle" opacity="0.95">ULTRASSOM MORFOLÓGICO</text>
  </g>

  <!-- Title -->
  <text x="400" y="320" font-family="Montserrat, Arial, sans-serif" font-size="26" font-weight="800"
        fill="#ffffff" text-anchor="middle">Ultrassom na gravidez</text>

  <!-- Subtitle -->
  <text x="400" y="355" font-family="Open Sans, Arial, sans-serif" font-size="15" font-weight="400"
        fill="#c8e47a" text-anchor="middle">Pré-natal • Morfológico • Doppler • Maracanaú – CE</text>

  <!-- Bottom accent line -->
  <rect x="280" y="370" width="240" height="3" rx="1.5" fill="url(#accent)" opacity="0.85"/>
</svg>
