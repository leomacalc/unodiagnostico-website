<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#005a87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003f5f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg1)" rx="0"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="80" r="120" fill="#abce5f" opacity="0.15"/>
  <circle cx="150" cy="350" r="80" fill="#005a87" opacity="0.08"/>
  <!-- Ultrasound probe icon -->
  <g transform="translate(320, 80)">
    <rect x="50" y="20" width="60" height="120" rx="30" fill="url(#accent1)" opacity="0.9"/>
    <rect x="60" y="140" width="40" height="80" rx="6" fill="#003f5f"/>
    <ellipse cx="80" cy="60" rx="18" ry="18" fill="#abce5f" opacity="0.6"/>
    <!-- Ultrasound waves -->
    <path d="M120 60 Q150 40 150 60 Q150 80 120 60" fill="none" stroke="#abce5f" stroke-width="2.5" opacity="0.7"/>
    <path d="M130 60 Q170 30 170 60 Q170 90 130 60" fill="none" stroke="#abce5f" stroke-width="2" opacity="0.5"/>
    <path d="M140 60 Q190 20 190 60 Q190 100 140 60" fill="none" stroke="#abce5f" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Text -->
  <text x="400" y="310" font-family="Montserrat, Arial, sans-serif" font-size="22" font-weight="700" fill="#005a87" text-anchor="middle">ULTRASSONOGRAFIA</text>
  <text x="400" y="340" font-family="Open Sans, Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle">Exame seguro, indolor e sem radiação</text>
</svg>
