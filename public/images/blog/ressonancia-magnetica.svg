<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e1bee7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg3)" rx="0"/>
  <!-- Decorative -->
  <circle cx="700" cy="320" r="100" fill="#005a87" opacity="0.05"/>
  <circle cx="100" cy="80" r="70" fill="#abce5f" opacity="0.08"/>
  <!-- MRI Machine simplified -->
  <g transform="translate(400, 170)">
    <!-- Machine body -->
    <ellipse cx="0" cy="0" rx="100" ry="80" fill="#005a87" opacity="0.15" stroke="#005a87" stroke-width="3"/>
    <ellipse cx="0" cy="0" rx="65" ry="50" fill="white" stroke="#005a87" stroke-width="2.5"/>
    <!-- Tunnel -->
    <ellipse cx="0" cy="0" rx="45" ry="35" fill="#e8f5e9" stroke="#abce5f" stroke-width="2"/>
    <!-- Magnetic field lines -->
    <path d="M-120,0 Q-120,-60 -80,-60" fill="none" stroke="#abce5f" stroke-width="2" opacity="0.5"/>
    <path d="M-130,0 Q-130,-80 -80,-80" fill="none" stroke="#abce5f" stroke-width="1.5" opacity="0.3"/>
    <path d="M120,0 Q120,-60 80,-60" fill="none" stroke="#abce5f" stroke-width="2" opacity="0.5"/>
    <path d="M130,0 Q130,-80 80,-80" fill="none" stroke="#abce5f" stroke-width="1.5" opacity="0.3"/>
    <path d="M-120,0 Q-120,60 -80,60" fill="none" stroke="#abce5f" stroke-width="2" opacity="0.5"/>
    <path d="M120,0 Q120,60 80,60" fill="none" stroke="#abce5f" stroke-width="2" opacity="0.5"/>
    <!-- "EM BREVE" badge -->
    <g transform="translate(0, -95)">
      <rect x="-50" y="-14" width="100" height="28" rx="14" fill="#abce5f"/>
      <text x="0" y="5" font-family="Montserrat, Arial, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">EM BREVE</text>
    </g>
  </g>
  <!-- Text -->
  <text x="400" y="310" font-family="Montserrat, Arial, sans-serif" font-size="22" font-weight="700" fill="#005a87" text-anchor="middle">RESSONÂNCIA MAGNÉTICA</text>
  <text x="400" y="340" font-family="Open Sans, Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle">Novo exame em breve na Uno Diagnóstico</text>
</svg>
